<!DOCTYPE html>
<html>
<head>
    <title>Login Service</title>

    <style>
        body {
            font-family: Arial;
            background: #1e1e2f;
            color: white;
            text-align: center;
            margin-top: 50px;
        }

        h1 {
            color: #00d4ff;
        }

        .container {
            background: #2c2c3e;
            padding: 20px;
            border-radius: 10px;
            width: 300px;
            margin: auto;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 5px;
            border: none;
        }

        button {
            background: #00d4ff;
            border: none;
            padding: 10px;
            width: 100%;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #00aacc;
        }

        #respuesta {
            margin-top: 15px;
            font-weight: bold;
        }

        .success {
            color: #00ff88;
        }

        .error {
            color: #ff4d4d;
        }
    </style>
</head>

<body>

    <h1>🔐 Servicio de Login</h1>

    <div class="container">

        <h2>Registro</h2>
        <input id="regUser" placeholder="Usuario">
        <input id="regPass" type="password" placeholder="Contraseña">
        <button onclick="register()">Registrar</button>

        <h2>Login</h2>
        <input id="logUser" placeholder="Usuario">
        <input id="logPass" type="password" placeholder="Contraseña">
        <button onclick="login()">Ingresar</button>

        <p id="respuesta"></p>

    </div>

    <script>
        function mostrarMensaje(texto, tipo) {
            const respuesta = document.getElementById("respuesta");
            respuesta.innerText = texto;

            respuesta.className = "";
            respuesta.classList.add(tipo);
        }

        async function register() {
            const usuario = document.getElementById("regUser").value;
            const password = document.getElementById("regPass").value;

            const res = await fetch("http://localhost:3000/api/register", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ usuario, password })
            });

            const data = await res.json();

            if (res.ok) {
                mostrarMensaje(data.mensaje, "success");
            } else {
                mostrarMensaje(data.mensaje, "error");
            }
        }

        async function login() {
            const usuario = document.getElementById("logUser").value;
            const password = document.getElementById("logPass").value;

            const res = await fetch("http://localhost:3000/api/login", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ usuario, password })
            });

            const data = await res.json();

            if (res.ok) {
                mostrarMensaje(data.mensaje, "success");
            } else {
                mostrarMensaje(data.mensaje, "error");
            }
        }
    </script>

</body>
</html>
